{% extends "base.html" %}

{% block content %}

<div class="auth-box">
    <div class="card">

        <h1>Welcome Back</h1>

        <form method="POST">

            <input
                 type="email"
                 name="email"
                 placeholder="Email"
                 required
            >

            <input
                 type="password"
                 name="password"
                 placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

            <p style="margin-top:20px; text-align:center;">
                Don't have an account?
                <a href="/register">Register</a>
            </p>

        </form>

    </div>

</div>

{% endblock %}
